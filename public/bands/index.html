<style>

  td.num{font-family:ui-monospace,Consolas,monospace;color:var(--hi)}
  td.dbl{font-family:ui-monospace,Consolas,monospace;color:var(--amber)}
  .sw{display:inline-block;width:11px;height:11px;border-radius:3px;
    margin-right:6px;vertical-align:-1px;border:1px solid rgba(255,255,255,.25)}
  .brand{color:var(--txt);font-weight:600}
  .model{color:var(--dim)}
  tr.ghead td{background:var(--panel2);color:var(--amber);font-weight:700;
    font-size:11px;letter-spacing:2px;border-top:2px solid var(--line);
    font-family:ui-monospace,Consolas,monospace}
  .note{color:var(--dim);font-size:11px}
  .est{color:var(--amber)}
  footer{margin-top:12px;font-size:10px;color:var(--dim);
    font-family:ui-monospace,Consolas,monospace;letter-spacing:1px}
</style>

var BRANDS = ["Serious Steel","Harambe","X3","Clench","Quantum","HeavyDutyBar","Dingzhou Baiyun","Tribe","Undersun"];

var COLOR_HEX = {
  "Orange":"#f97316","Orange Heavy":"#c2410c","Purple":"#a855f7","Red":"#ef4444",
  "Blue":"#3b82f6","Light Blue":"#7dd3fc","Green":"#22c55e","Light Green":"#86efac",
  "Heavy Green":"#15803d","Black":"#111827","Yellow":"#eab308","Gray":"#9ca3af",
  "Grey":"#9ca3af","Light Grey":"#d1d5db","Dark Grey":"#4b5563","White":"#f8fafc",
  "White (Ultra Light)":"#f8fafc"
};

var VIEWS = [
  { id:"v1", label:"BRAND&rarr;LEN&rarr;STR",
    sort:function(a,b){ return cmp(a.brand,b.brand)||cmp(a.len,b.len)||cmp(a.low,b.low); } },
  { id:"v2", label:"STR&rarr;LEN",
    sort:function(a,b){ return cmp(a.low,b.low)||cmp(a.len,b.len); } },
  { id:"v3", label:"LEN&rarr;STR",
    sort:function(a,b){ return cmp(a.len,b.len)||cmp(a.low,b.low); } },
  { id:"v4", label:"GROUPED", grouped:true,
    sort:function(a,b){ return cmp(a.groupOrder,b.groupOrder)||cmp(a.low,b.low); } }
];

var view = "v1", brand = "All";

function cmp(a,b){ return a<b?-1:(a>b?1:0); }
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function swatch(color){
  var hex = COLOR_HEX[color] || "#64748b";
  return '<span class="sw" style="background:'+hex+'"></span>';
}

function rowHtml(b){
  var est = b.est ? ' <span class="est">~</span>' : '';
  return '<tr>'+
    '<td class="brand">'+esc(b.brand)+'</td>'+
    '<td>'+swatch(b.color)+esc(b.color)+(b.model?' <span class="model">'+esc(b.model)+'</span>':'')+'</td>'+
    '<td class="num">'+b.len+'&Prime;</td>'+
    '<td class="num">'+esc(b.single)+est+'</td>'+
    '<td class="dbl">'+esc(b.doubled)+est+'</td>'+
    '<td class="num">'+b.maxStretch+'&Prime;</td>'+
    '<td class="note">'+esc(b.note)+'</td>'+
    '</tr>';
}

function render(){
  var v = VIEWS.filter(function(x){return x.id===view;})[0];
  var list = BANDS.filter(function(b){ return brand==="All" || b.brand===brand; })
                  .slice().sort(v.sort);
  var html = "";
  if(v.grouped){
    var last = null;
    list.forEach(function(b){
      if(b.group !== last){
        last = b.group;
        html += '<tr class="ghead"><td colspan="7">'+esc(b.group)+'</td></tr>';
      }
      html += rowHtml(b);
    });
  } else {
    html = list.map(rowHtml).join("");
  }
  document.getElementById("rows").innerHTML = html;
  document.getElementById("counts").textContent =
    list.length+" BANDS SHOWN · "+BANDS.length+" TOTAL · "+BRANDS.length+" BRANDS";
  document.querySelectorAll("#tabs button").forEach(function(btn){
    btn.className = btn.dataset.v===view ? "on" : "";
  });
  document.querySelectorAll("#filters button").forEach(function(btn){
    btn.className = btn.dataset.b===brand ? "on" : "";
  });
}

var tabs = document.getElementById("tabs");
VIEWS.forEach(function(v){
  var btn = document.createElement("button");
  btn.innerHTML = v.label; btn.dataset.v = v.id;
  btn.onclick = function(){ view = v.id; render(); };
  tabs.appendChild(btn);
});
var filters = document.getElementById("filters");
["All"].concat(BRANDS).forEach(function(name){
  var btn = document.createElement("button");
  btn.textContent = name.toUpperCase(); btn.dataset.b = name;
  btn.onclick = function(){ brand = name; render(); };
  filters.appendChild(btn);
});
render();
</script>
